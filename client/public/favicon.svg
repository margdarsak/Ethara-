<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0a0a0a"/>
  <!-- Red gradient background glow -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" opacity="0.85"/>
  <!-- Checkmark / task icon -->
  <polyline points="16,33 27,44 48,22" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff0844"/>
      <stop offset="100%" stop-color="#c0103a"/>
    </linearGradient>
  </defs>
</svg>